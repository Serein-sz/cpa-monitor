name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.os-name }}
    runs-on: ${{ matrix.platform.runs-on }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        platform:
          - os-name: Linux-x86_64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: cpa-monitor-linux-amd64
            binary_suffix: ""

          - os-name: macOS-x86_64
            runs-on: macos-latest
            target: x86_64-apple-darwin
            archive_name: cpa-monitor-darwin-amd64
            binary_suffix: ""

          - os-name: macOS-aarch64
            runs-on: macos-latest
            target: aarch64-apple-darwin
            archive_name: cpa-monitor-darwin-arm64
            binary_suffix: ""

          - os-name: Windows-x86_64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: cpa-monitor-windows-amd64
            binary_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build binaries
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "--locked --release -p cpa-ingestor -p cpa-aggregator"
          strip: true

      - name: Prepare binaries
        shell: bash
        run: |
          mkdir -p bin

          RELEASE_DIR="target/${{ matrix.platform.target }}/release"
          SUFFIX="${{ matrix.platform.binary_suffix }}"

          cp "$RELEASE_DIR/cpa-ingestor$SUFFIX" \
             "bin/cpa-ingestor-${{ matrix.platform.target }}$SUFFIX"

          cp "$RELEASE_DIR/cpa-aggregator$SUFFIX" \
             "bin/cpa-aggregator-${{ matrix.platform.target }}$SUFFIX"

      - name: Compress package
        shell: bash
        run: |
          cd bin

          tar czf "${{ matrix.platform.archive_name }}.tar.gz" \
            "cpa-ingestor-${{ matrix.platform.target }}${{ matrix.platform.binary_suffix }}" \
            "cpa-aggregator-${{ matrix.platform.target }}${{ matrix.platform.binary_suffix }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.os-name }}
          path: |
            bin/${{ matrix.platform.archive_name }}.tar.gz
            bin/cpa-ingestor-${{ matrix.platform.target }}${{ matrix.platform.binary_suffix }}
            bin/cpa-aggregator-${{ matrix.platform.target }}${{ matrix.platform.binary_suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display structure
        run: ls -la artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "cpa-monitor ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*