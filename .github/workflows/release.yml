name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_suffix: ''
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_suffix: ''
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_suffix: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_suffix: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_suffix: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p cpa-ingestor -p cpa-aggregator

      - name: Package binaries
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf cpa-monitor-${{ matrix.target }}.tar.gz \
            cpa-ingestor${{ matrix.binary_suffix }} \
            cpa-aggregator${{ matrix.binary_suffix }}
          mv cpa-monitor-${{ matrix.target }}.tar.gz ${{ github.workspace }}/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpa-monitor-${{ matrix.target }}
          path: cpa-monitor-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*/*.tar.gz
